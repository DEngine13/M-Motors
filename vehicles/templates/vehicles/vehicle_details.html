<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <title>{{ vehicle }} — M-Motors</title>
    <link
      href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css"
      rel="stylesheet"
    />
  </head>
  <body>
    <div class="container my-4">
      <a
        href="{% url 'vehicles:vehicle_list' %}"
        class="btn btn-outline-secondary mb-3"
        >Back to catalog</a
      >

      <div class="row">
        <div class="col-md-6">
          <div
            class="bg-light d-flex align-items-center justify-content-center rounded"
            style="height: 300px"
          >
            <span class="text-muted">Picture coming soon</span>
          </div>
        </div>
        <div class="col-md-6">
          <h1>{{ vehicle.brand }} {{ vehicle.model }}</h1>
          <table class="table">
            <tr>
              <th>Year</th>
              <td>{{ vehicle.year }}</td>
            </tr>
            <tr>
              <th>Mileage</th>
              <td>{{ vehicle.mileage }} km</td>
            </tr>
            <tr>
              <th>Price</th>
              <td class="fw-bold text-primary fs-4">
                {{ vehicle.sale_price }} €
              </td>
            </tr>
          </table>
        </div>
      </div>
    </div>
  </body>
</html>
